<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Long Division Organizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --line: #111;
      --bg: #f6f8fc;
      --panel: #fff;
      --accent: #1976d2;
      --text: #1f365f;
      --muted: #35516f;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: "Poppins", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      overflow-x: hidden;
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 18px;
    }

    .head {
      border: 2px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      padding: 20px 18px 18px;
      margin-bottom: 14px;
      text-align: center;
    }

    .head h1 {
      margin: 0;
      font-size: clamp(36px, 4.2vw, 58px);
      line-height: 1.06;
      font-weight: 800;
      color: #111;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 20px;
      line-height: 1.35;
      font-weight: 700;
      color: var(--muted);
    }

    .controls {
      border: 2px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      padding: 16px;
      margin-bottom: 14px;
      text-align: center;
    }

    .btn-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 300px));
      justify-content: center;
      gap: 14px;
    }

    .main-btn {
      width: 100%;
      min-height: 58px;
      border-radius: 16px;
      border: 2px solid var(--line);
      font-family: "Poppins", Arial, sans-serif;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      padding: 12px 10px;
      background: #fff;
      color: #111;
    }

    #btnGenerate {
      background: var(--accent);
      color: #fff;
    }

    .type-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 220px));
      justify-content: center;
      gap: 12px;
      margin-top: 14px;
    }

    .type-btn {
      border: 2px solid #b7c9df;
      border-radius: 14px;
      padding: 12px 10px;
      text-align: center;
      font-family: "Poppins", Arial, sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: #f7fbff;
      color: #23466f;
      line-height: 1.25;
    }

    .type-btn.active {
      background: #dcecff;
      border-color: #6ea7e8;
      color: #163e6d;
    }

    .status {
      margin: 12px 0 0;
      min-height: 1.3em;
      font-size: 15px;
      font-weight: 700;
      color: #55657e;
    }

    .sheet-wrap {
      border: 2px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 14px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      max-height: 84vh;
    }

    .sheet {
      position: relative;
      width: 100%;
      max-width: 1120px;
      min-height: 860px;
      margin: 0 auto;
      background: #fff;
      border: 2px solid #000;
      border-radius: 10px;
      padding: 18px 18px 186px;
      overflow: hidden;
    }

    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      border-bottom: 2px solid #000;
      padding-bottom: 8px;
      margin-bottom: 14px;
    }

    .sheet-title {
      margin: 0;
      font-size: clamp(28px, 2.6vw, 36px);
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1.15;
      color: #111;
    }

    .name-line {
      white-space: nowrap;
      font-size: 18px;
      font-weight: 700;
      color: #111;
    }

    .name-line .line {
      display: inline-block;
      width: 180px;
      border-bottom: 3px solid #000;
      transform: translateY(-2px);
      margin-left: 8px;
    }

    .problem-grid {
      display: grid;
      gap: 14px;
      align-items: start;
    }

    .problem-grid.cards-6,
    .problem-grid.cards-4 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .problem-card {
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: 2px solid #000;
      padding: 10px;
      break-inside: avoid;
      page-break-inside: avoid;
      background: #fff;
    }

    .problem-main {
      display: grid;
      grid-template-columns: 118px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .multiples-panel {
      border: 2px solid #000;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-self: start;
    }

    .multiples-head {
      border-bottom: 2px solid #000;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      padding: 5px 4px;
      color: #111;
    }

    .multiples-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 14px;
      font-weight: 700;
      color: #111;
    }

    .multiples-table td {
      border-top: 2px solid #000;
      text-align: center;
      height: 28px;
      padding: 2px;
    }

    .multiples-table td:first-child {
      width: 44%;
      border-right: 2px solid #000;
    }

    .problem-panel {
      display: flex;
      align-items: flex-start;
      border: 2px solid #000;
      background: #fff;
      padding: 8px;
      overflow-x: auto;
      min-height: 234px;
    }

    .ld-table-wrap {
      --cell-w: 34px;
      --cell-h: 28px;
      --cell-font: 1rem;
      --minus-w: 16px;
      --minus-font: 1.05rem;
      width: fit-content;
    }

    .ld-table {
      border-collapse: collapse;
      table-layout: fixed;
    }

    .ld-table td {
      width: var(--cell-w);
      height: var(--cell-h);
      padding: 0;
      text-align: center;
      vertical-align: middle;
      font-size: var(--cell-font);
      font-weight: 700;
      line-height: 1;
      color: #111;
    }

    .ld-minus-col { width: var(--minus-w) !important; }
    .ld-pad { border: 0; background: transparent; }
    .ld-box { border: 2px solid #000; background: #fff; }
    .ld-minus-mark {
      border: 0;
      background: transparent;
      font-size: var(--minus-font);
      font-weight: 800;
      text-align: right;
      padding-right: 2px;
    }
    .ld-rem-label {
      border: 0;
      background: transparent;
      font-weight: 800;
      font-size: calc(var(--cell-font) * 0.82);
      width: 14px !important;
      text-align: center;
    }
    .ld-dividend-top { border-top: 4px solid #000 !important; }
    .ld-bracket-left { border-left: 4px solid #000 !important; }
    .ld-line-under { border-bottom: 4px solid #000 !important; }

    .footer-note {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 2px solid #000;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #000;
      line-height: 1.25;
    }

    .preview-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      opacity: 0.55;
      background-image:
        repeating-linear-gradient(-24deg, rgba(0, 0, 0, 0.12) 0 16px, rgba(255, 255, 255, 0.05) 16px 32px),
        url("data:image/svg+xml,%3Csvg width='360' height='240' viewBox='0 0 360 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cg transform='rotate(-23 180 120)'%3E%3Ctext x='22' y='112' fill='%23000' fill-opacity='.4' font-family='Poppins' font-size='40' font-weight='800'%3EPREVIEW%3C/text%3E%3Ctext x='92' y='158' fill='%23000' fill-opacity='.3' font-family='Poppins' font-size='20' font-weight='700'%3ENOT FOR CLASSROOM USE%3C/text%3E%3C/g%3E%3C/svg%3E");
      background-size: auto, 360px 240px;
      background-repeat: repeat;
    }

    .members-lock {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 30;
      border: 2px solid #fff;
      border-radius: 16px;
      background: rgba(15, 18, 24, 0.9);
      color: #fff;
      text-align: center;
      padding: 14px 12px 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .members-lock-title {
      margin: 0;
      font-size: 46px;
      line-height: 1;
      font-weight: 900;
    }

    .members-lock-copy {
      margin: 10px 0 10px;
      font-size: 16px;
      font-weight: 700;
    }

    .members-lock a {
      display: inline-block;
      text-decoration: none;
      border-radius: 999px;
      background: #fff;
      color: #111;
      border: 2px solid #fff;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: 800;
    }

    @media (max-width: 1100px) {
      .wrap { padding: 12px; }
      .head { padding: 16px 14px 14px; }
      .subtitle { font-size: 16px; }
      .status { font-size: 13px; }
      .sheet {
        max-width: 100%;
        min-height: 700px;
        padding: 14px 14px 144px;
      }
      .sheet-header {
        gap: 8px;
        margin-bottom: 10px;
      }
      .name-line {
        font-size: 13px;
      }
      .name-line .line {
        width: 100px;
        border-bottom-width: 2px;
        margin-left: 4px;
      }
      .problem-grid.cards-6,
      .problem-grid.cards-4 {
        grid-template-columns: 1fr;
      }
      .problem-main {
        grid-template-columns: 94px minmax(0, 1fr);
        gap: 8px;
      }
      .multiples-head {
        font-size: 10px;
        padding: 4px 3px;
      }
      .multiples-table {
        font-size: 11px;
      }
      .multiples-table td {
        height: 22px;
      }
      .problem-panel {
        padding: 5px;
        min-height: 0;
      }
      .members-lock {
        left: 10px;
        right: 10px;
        bottom: 10px;
        padding: 10px 10px 12px;
      }
      .members-lock-title { font-size: 30px; }
      .members-lock-copy {
        margin: 6px 0 8px;
        font-size: 12px;
      }
      .members-lock a {
        padding: 7px 14px;
        font-size: 12px;
      }
    }

    @media (max-width: 760px) {
      .btn-row,
      .type-row {
        grid-template-columns: 1fr;
      }
      .sheet-title {
        font-size: 22px;
      }
      .sheet-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media print {
      body { display: none !important; }
    }
  </style>
</head>
<body oncontextmenu="return false;">
  <div class="wrap">
    <section class="head">
      <h1>Long Division Organizer</h1>
    </section>

    <section class="controls">
      <div class="btn-row">
        <button id="btnGenerate" class="main-btn" type="button">Generate</button>
        <button id="btnPrint" class="main-btn" type="button">Print</button>
      </div>

      <div id="typeRow" class="type-row" role="radiogroup" aria-label="Problem type">
        <button type="button" class="type-btn active" data-type="2x1">2 by 1</button>
        <button type="button" class="type-btn" data-type="3x1">3 by 1</button>
        <button type="button" class="type-btn" data-type="4x1">4 by 1</button>
      </div>

      <p id="status" class="status">Ready.</p>
    </section>

    <section class="sheet-wrap">
      <div id="worksheetHost"></div>
    </section>
  </div>

  <script>
    const els = {
      host: document.getElementById("worksheetHost"),
      status: document.getElementById("status"),
      typeButtons: Array.from(document.querySelectorAll(".type-btn")),
      generateBtn: document.getElementById("btnGenerate"),
      printBtn: document.getElementById("btnPrint")
    };

    const state = {
      problemType: "2x1",
      problemMode: "random",
      templateMode: "normal",
      remainderMode: "without",
      multiplesMode: "blank",
      sheetTitle: "Long Division Practice Organizer"
    };

    const TYPE_CONFIG = {
      "2x1": { digits: 2, min: 10, max: 99, label: "2-digit by 1-digit", cardCount: 6 },
      "3x1": { digits: 3, min: 100, max: 999, label: "3-digit by 1-digit", cardCount: 4 },
      "4x1": { digits: 4, min: 1000, max: 9999, label: "4-digit by 1-digit", cardCount: 4 }
    };

    function getTypeConfig() {
      return TYPE_CONFIG[state.problemType] || TYPE_CONFIG["2x1"];
    }

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function setProblemType(typeKey) {
      if (!TYPE_CONFIG[typeKey]) return;
      state.problemType = typeKey;
      els.typeButtons.forEach(function(btn) {
        btn.classList.toggle("active", btn.dataset.type === typeKey);
      });
    }

    function matchesRemainderMode(problem, remainderMode) {
      const rem = problem.dividend % problem.divisor;
      if (remainderMode === "with") return rem !== 0;
      if (remainderMode === "without") return rem === 0;
      return true;
    }

    function makeRandomProblem(cfg, remainderMode) {
      for (let tries = 0; tries < 4000; tries += 1) {
        const divisor = randInt(2, 9);
        const firstDigit = randInt(1, divisor - 1);
        let rest = "";
        for (let i = 1; i < cfg.digits; i += 1) {
          rest += String(randInt(0, 9));
        }
        const dividend = Number(String(firstDigit) + rest);
        if (dividend < cfg.min || dividend > cfg.max) continue;
        const problem = { dividend: dividend, divisor: divisor };
        if (!matchesRemainderMode(problem, remainderMode)) continue;
        return problem;
      }

      for (let divisor = 2; divisor <= 9; divisor += 1) {
        for (let dividend = cfg.min; dividend <= cfg.max; dividend += 1) {
          const firstDigit = Number(String(dividend)[0]);
          const problem = { dividend: dividend, divisor: divisor };
          if (firstDigit >= divisor) continue;
          if (!matchesRemainderMode(problem, remainderMode)) continue;
          return problem;
        }
      }

      return { dividend: cfg.min, divisor: 2 };
    }

    function buildProblems(cfg, cardCount, remainderMode) {
      const problems = [];
      const seen = new Set();
      let tries = 0;

      while (problems.length < cardCount && tries < 4000) {
        const problem = makeRandomProblem(cfg, remainderMode);
        const key = String(problem.dividend) + "/" + String(problem.divisor);
        tries += 1;
        if (seen.has(key)) continue;
        seen.add(key);
        problems.push(problem);
      }

      return {
        problems: problems,
        warning: false,
        message: "Generated " + String(problems.length) + " random " + cfg.label + " problems."
      };
    }

    function multiplesRowsHtml(divisor, mode, blankTemplate) {
      let rows = "";
      for (let i = 1; i <= 9; i += 1) {
        const value = blankTemplate ? "&nbsp;" : (mode === "filled" ? String(divisor * i) : "&nbsp;");
        rows += "<tr><td>x" + String(i) + "</td><td>" + value + "</td></tr>";
      }
      return rows;
    }

    function longDivisionGridHtml(problem, cfg, blankTemplate, cardCount, showRemainderBox) {
      const digitsCount = cfg.digits;
      const digits = String(problem.dividend).split("");
      const rows = [];
      const td = function(content, cls) { return '<td class="' + cls + '">' + content + "</td>"; };

      let row = "<tr>" + td("&nbsp;", "ld-pad ld-minus-col") + td("&nbsp;", "ld-pad");
      for (let i = 0; i < digitsCount; i += 1) row += td("&nbsp;", "ld-box");
      if (showRemainderBox) {
        row += td("R", "ld-rem-label");
        row += td("&nbsp;", "ld-box");
      }
      row += "</tr>";
      rows.push(row);

      row = "<tr>" + td("&nbsp;", "ld-pad ld-minus-col") + td(blankTemplate ? "&nbsp;" : problem.divisor, "ld-box");
      for (let i = 0; i < digitsCount; i += 1) {
        row += td(blankTemplate ? "&nbsp;" : digits[i], "ld-box ld-dividend-top" + (i === 0 ? " ld-bracket-left" : ""));
      }
      if (showRemainderBox) {
        row += td("&nbsp;", "ld-pad");
        row += td("&nbsp;", "ld-pad");
      }
      row += "</tr>";
      rows.push(row);

      const totalCols = digitsCount + 2 + (showRemainderBox ? 2 : 0);

      for (let i = 0; i < digitsCount; i += 1) {
        const startDigit = i === 0 ? 0 : Math.min(i - 1, digitsCount - 2);
        const startCol = 2 + startDigit;
        const productLen = i === 0 ? 1 : 2;
        const bringStart = i < digitsCount - 1 ? 2 + Math.min(startDigit + (productLen - 1), digitsCount - 2) : startCol;

        let subtractRow = "<tr>";
        for (let c = 0; c < totalCols; c += 1) {
          if (c === 0) subtractRow += td("&nbsp;", "ld-pad ld-minus-col");
          else if (c === 1) subtractRow += td("&minus;", "ld-minus-mark");
          else if (c >= startCol && c < startCol + productLen) subtractRow += td("&nbsp;", "ld-box ld-line-under");
          else subtractRow += td("&nbsp;", "ld-pad");
        }
        subtractRow += "</tr>";
        rows.push(subtractRow);

        let bringRow = "<tr>";
        for (let c = 0; c < totalCols; c += 1) {
          if (c <= 1) bringRow += td("&nbsp;", c === 0 ? "ld-pad ld-minus-col" : "ld-pad");
          else if (c >= bringStart && c < bringStart + 2) bringRow += td("&nbsp;", "ld-box");
          else bringRow += td("&nbsp;", "ld-pad");
        }
        bringRow += "</tr>";
        rows.push(bringRow);
      }

      const isFourUp = cardCount === 4;
      const cellW = isFourUp ? (digitsCount >= 4 ? 32 : (digitsCount === 3 ? 34 : 36)) : (digitsCount >= 4 ? 27 : (digitsCount === 3 ? 29 : 34));
      const cellH = isFourUp ? (digitsCount >= 4 ? 25 : (digitsCount === 3 ? 27 : 28)) : (digitsCount >= 4 ? 21 : (digitsCount === 3 ? 23 : 28));
      const cellFont = isFourUp ? (digitsCount >= 4 ? "0.96rem" : (digitsCount === 3 ? "1rem" : "1.02rem")) : (digitsCount >= 4 ? "0.86rem" : (digitsCount === 3 ? "0.92rem" : "1rem"));
      const minusFont = isFourUp ? (digitsCount >= 4 ? "1rem" : (digitsCount === 3 ? "1.08rem" : "1.12rem")) : (digitsCount >= 4 ? "0.94rem" : (digitsCount === 3 ? "1rem" : "1.14rem"));

      return '<div class="ld-table-wrap" style="--cell-w:' + String(cellW) + 'px;--cell-h:' + String(cellH) + 'px;--cell-font:' + cellFont + ';--minus-font:' + minusFont + ';"><table class="ld-table" aria-label="Long division workspace"><tbody>' + rows.join("") + "</tbody></table></div>";
    }

    function renderProblemCard(problem, cfg, blankTemplate, cardCount, showRemainderBox) {
      return "" +
        '<article class="problem-card">' +
          '<div class="problem-main">' +
            '<div class="multiples-panel">' +
              '<div class="multiples-head">Multiples</div>' +
              '<table class="multiples-table" aria-label="Multiples chart"><tbody>' + multiplesRowsHtml(problem.divisor, state.multiplesMode, blankTemplate) + "</tbody></table>" +
            "</div>" +
            '<div class="problem-panel">' + longDivisionGridHtml(problem, cfg, blankTemplate, cardCount, showRemainderBox) + "</div>" +
          "</div>" +
        "</article>";
    }

    function renderWorksheet() {
      const cfg = getTypeConfig();
      const cardCount = cfg.cardCount;
      const remainderMode = state.remainderMode;
      const source = buildProblems(cfg, cardCount, remainderMode);
      const blankTemplate = state.templateMode === "blank";
      const showRemainderBox = remainderMode !== "without";
      const title = (state.sheetTitle || "").trim() || "Long Division Practice Organizer";

      if (!source.problems.length) {
        els.host.innerHTML = "";
        els.status.textContent = "No problems generated.";
        return;
      }

      const cards = source.problems.map(function(problem) {
        return renderProblemCard(problem, cfg, blankTemplate, cardCount, showRemainderBox);
      }).join("");

      els.host.innerHTML = "" +
        '<section class="sheet">' +
          '<header class="sheet-header">' +
            '<h2 class="sheet-title">' + title + " (" + cfg.label + ')</h2>' +
            '<div class="name-line">Name:<span class="line"></span></div>' +
          "</header>" +
          '<section class="problem-grid cards-' + String(cardCount) + '">' + cards + "</section>" +
          '<div class="footer-note">Copyright - InterventionStation.com - @TeachwithMrC</div>' +
          '<div class="preview-overlay" aria-hidden="true"></div>' +
          '<div class="members-lock">' +
            '<p class="members-lock-title">Members Only</p>' +
            '<p class="members-lock-copy">Printing is for Members Only. Create an Unlimited Amount as a Member.</p>' +
            '<a href="https://interventionstation.com" target="_blank" rel="noopener noreferrer">Join</a>' +
          "</div>" +
        "</section>";

      els.status.textContent = source.message;
    }

    els.generateBtn.addEventListener("click", renderWorksheet);

    els.typeButtons.forEach(function(btn) {
      btn.addEventListener("click", function() {
        setProblemType(btn.dataset.type);
      });
    });

    els.printBtn.addEventListener("click", function() {
      showPrintMembersOnlyNotice();
      els.status.textContent = "Printing is for Members Only.";
    });

    setProblemType("2x1");
    renderWorksheet();
  </script>
</body>
</html>
