<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partial Products Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --line: #111;
      --bg: #f6f8fc;
      --panel: #fff;
      --accent: #6ec1ff;
      --text: #111;
      --muted: #334861;
      --tone0: #f7ead8;
      --tone1: #e7f2fb;
      --tone2: #e5f6e9;
      --tone3: #f9e3f1;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: "Poppins", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      overflow-x: hidden;
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 18px;
    }

    .head {
      border: 2px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      padding: 20px 18px 18px;
      margin-bottom: 14px;
      text-align: center;
    }

    .head h1 {
      margin: 0;
      font-size: clamp(36px, 4.2vw, 58px);
      line-height: 1.06;
      font-weight: 800;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 20px;
      line-height: 1.35;
      font-weight: 700;
      color: var(--muted);
    }

    .controls {
      border: 2px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      padding: 16px;
      margin-bottom: 14px;
    }

    .controls-top {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 320px));
      justify-content: center;
      gap: 14px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .field label {
      font-size: 18px;
      font-weight: 900;
      text-align: center;
      color: #22344f;
    }

    select {
      height: 58px;
      width: 100%;
      border: 2px solid var(--line);
      border-radius: 12px;
      padding: 8px 12px;
      font-family: "Poppins", Arial, sans-serif;
      font-size: 21px;
      font-weight: 800;
      background: #fff;
      color: #111;
    }

    .controls-actions {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 300px));
      justify-content: center;
      gap: 14px;
    }

    .btn {
      width: 100%;
      min-height: 58px;
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 12px 10px;
      font-family: "Poppins", Arial, sans-serif;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: #111;
    }

    .hint {
      margin-top: 12px;
      text-align: center;
      min-height: 1.3em;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      color: #4a617c;
    }

    .sheet-wrap {
      border: 2px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 14px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      max-height: 84vh;
    }

    .page {
      position: relative;
      width: 100%;
      max-width: 1120px;
      min-height: 860px;
      margin: 0 auto;
      background: #fff;
      border: 2px solid #000;
      border-radius: 10px;
      padding: 18px 18px 186px;
      overflow: hidden;
    }

    .sheet-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      border-bottom: 2px solid #000;
      padding-bottom: 8px;
    }

    .sheet-title {
      margin: 0;
      font-size: clamp(34px, 2.7vw, 42px);
      line-height: 1.08;
      font-weight: 900;
      color: #111;
    }

    .name-line {
      white-space: nowrap;
      font-family: Arial, sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #111;
    }

    .name-line .line {
      display: inline-block;
      width: 180px;
      border-bottom: 3px solid #111;
      transform: translateY(-2px);
      margin-left: 8px;
    }

    .problem-card {
      border: 2px solid #111;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 620px;
      background: #fff;
    }

    .problem-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .problem-id {
      font-size: 24px;
      font-weight: 900;
      color: #111;
    }

    .problem-eq {
      padding: 6px 4px;
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
      background: #fff;
      color: #111;
    }

    .workspace-row {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(360px, 1fr);
      gap: 14px;
      align-items: start;
    }

    .area-panel,
    .addition-panel,
    .multiples-block {
      border: 2px solid #111;
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    .area-title,
    .addition-title,
    .multiples-title {
      margin: 0 0 10px;
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: #111;
    }

    .area-top-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }

    .area-main {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
    }

    .area-left-wrap {
      display: grid;
      gap: 10px;
    }

    .area-grid {
      display: grid;
      gap: 10px;
    }

    .pv-box {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border: 0;
      border-radius: 0;
      font-size: 26px;
      font-weight: 900;
      background: transparent;
      font-variant-numeric: tabular-nums;
      color: #111;
    }

    .area-cell {
      border: 2px solid #111;
      border-radius: 10px;
      min-height: 132px;
      padding: 10px 10px 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .tone-0 { background: var(--tone0); }
    .tone-1 { background: var(--tone1); }
    .tone-2 { background: var(--tone2); }
    .tone-3 { background: var(--tone3); }

    .eq-line {
      font-size: 21px;
      font-weight: 800;
      line-height: 1.22;
      color: #111;
    }

    .blank-line {
      display: block;
      width: 100%;
      border-bottom: 4px solid #111;
      min-height: 1.4em;
    }

    .addition-table {
      border-collapse: separate;
      border-spacing: 6px;
      margin: 0 auto;
    }

    .add-sign {
      width: 28px;
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      color: #111;
    }

    .add-cell {
      width: 48px;
      height: 48px;
      border: 2px solid #111;
      text-align: center;
      vertical-align: middle;
      font-size: 24px;
      font-weight: 800;
      background: #fff;
      font-variant-numeric: tabular-nums;
      color: #111;
    }

    .add-separator td {
      padding-top: 0;
      padding-bottom: 0;
    }

    .add-line {
      border-top: 4px solid #000;
      height: 0;
    }

    .add-cell.partial {
      border-color: #777;
    }

    .add-cell.partial.tone-0 { background: var(--tone0); }
    .add-cell.partial.tone-1 { background: var(--tone1); }
    .add-cell.partial.tone-2 { background: var(--tone2); }
    .add-cell.partial.tone-3 { background: var(--tone3); }

    .multiples-table {
      width: 100%;
      border-collapse: collapse;
    }

    .multiples-table td {
      border: 2px solid #111;
      text-align: center;
      vertical-align: middle;
      padding: 8px 6px;
      font-size: 16px;
      font-weight: 800;
      min-width: 38px;
      background: #fff;
      color: #111;
    }

    .multiple-blank {
      display: block;
      width: 100%;
      min-height: 1.2em;
      border-bottom: 2px solid #111;
    }

    .sheet-footer {
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 700;
      text-align: left;
      color: #111;
    }

    .copyright {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #111;
    }

    .preview-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      opacity: 0.52;
      background-image:
        repeating-linear-gradient(-26deg, rgba(0,0,0,.08) 0 18px, rgba(255,255,255,.06) 18px 36px),
        url("data:image/svg+xml,%3Csvg width='340' height='220' viewBox='0 0 340 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cg transform='rotate(-22 170 110)'%3E%3Ctext x='18' y='90' fill='%23000' fill-opacity='.26' font-family='Poppins' font-size='34' font-weight='900'%3EPREVIEW ONLY%3C/text%3E%3Ctext x='44' y='146' fill='%23000' fill-opacity='.2' font-family='Poppins' font-size='22' font-weight='800'%3ENOT FOR CLASSROOM USE%3C/text%3E%3C/g%3E%3C/svg%3E");
      background-size: auto, 340px 220px;
      background-repeat: repeat;
    }

    .members-lock {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 30;
      border: 2px solid #fff;
      border-radius: 16px;
      background: rgba(15, 18, 24, 0.9);
      color: #fff;
      text-align: center;
      padding: 14px 12px 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .members-lock-title {
      margin: 0;
      font-size: 46px;
      line-height: 1;
      font-weight: 900;
    }

    .members-lock-copy {
      margin: 10px 0 10px;
      font-size: 16px;
      font-weight: 700;
    }

    .members-lock a {
      display: inline-block;
      text-decoration: none;
      border-radius: 999px;
      background: #fff;
      color: #111;
      border: 2px solid #fff;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: 800;
    }

    @media (max-width: 1100px) {
      .wrap { padding: 12px; }
      .head { padding: 16px 14px 14px; }
      .subtitle { font-size: 16px; }
      .controls-top {
        grid-template-columns: 1fr 1fr;
      }
      .page {
        max-width: 100%;
        min-height: 700px;
        padding: 14px 14px 144px;
      }
      .sheet-header {
        gap: 8px;
        margin-bottom: 10px;
      }
      .sheet-title {
        font-size: clamp(24px, 4vw, 32px);
      }
      .name-line {
        font-size: 13px;
      }
      .name-line .line {
        width: 100px;
        border-bottom-width: 2px;
        margin-left: 4px;
      }
      .problem-card {
        min-height: 0;
        padding: 10px;
      }
      .problem-id {
        font-size: 18px;
      }
      .problem-eq {
        font-size: 24px;
      }
      .workspace-row {
        grid-template-columns: 1fr;
      }
      .pv-box {
        min-height: 30px;
        font-size: 18px;
      }
      .area-cell {
        min-height: 88px;
        padding: 7px 8px 6px;
      }
      .eq-line {
        font-size: 14px;
      }
      .add-sign {
        width: 22px;
        font-size: 24px;
      }
      .add-cell {
        width: 36px;
        height: 36px;
        font-size: 19px;
      }
      .multiples-table td {
        padding: 4px;
        font-size: 13px;
      }
      .members-lock {
        left: 10px;
        right: 10px;
        bottom: 10px;
        padding: 10px 10px 12px;
      }
      .members-lock-title { font-size: 30px; }
      .members-lock-copy {
        margin: 6px 0 8px;
        font-size: 12px;
      }
      .members-lock a {
        padding: 7px 14px;
        font-size: 12px;
      }
    }

    @media (max-width: 760px) {
      .controls-top,
      .controls-actions {
        grid-template-columns: 1fr;
      }
      .sheet-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .problem-top {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media print {
      body { display: none !important; }
    }
  </style>
</head>
<body oncontextmenu="return false;">
  <div class="wrap">
    <section class="head">
      <h1>Partial Products Preview</h1>
      <p class="subtitle">Select problem type and multiples fill mode, then tap <strong>Generate Preview</strong>.</p>
    </section>

    <section class="controls">
      <div class="controls-top">
        <div class="field">
          <label for="problemType">Type of Problem</label>
          <select id="problemType">
            <option value="2x1" selected>2 x 1</option>
            <option value="3x1">3 x 1</option>
            <option value="4x1">4 x 1</option>
            <option value="2x2">2 x 2</option>
          </select>
        </div>

        <div class="field">
          <label for="fillMultiplesValues">Multiples Filled In</label>
          <select id="fillMultiplesValues">
            <option value="yes" selected>Yes</option>
            <option value="no">No</option>
          </select>
        </div>
      </div>

      <div class="controls-actions">
        <button type="button" id="btnGen" class="btn btn-primary">Generate Preview</button>
        <button type="button" id="btnPrint" class="btn btn-secondary">Print</button>
      </div>

      <p class="hint" id="hint"></p>
    </section>

    <section class="sheet-wrap">
      <div id="worksheetHost"></div>
    </section>
  </div>

  <script>
    const $ = function(id) { return document.getElementById(id); };

    const TYPE_CONFIG = {
      "2x1": { aDigits: 2, bDigits: 1, label: "2 x 1" },
      "3x1": { aDigits: 3, bDigits: 1, label: "3 x 1" },
      "4x1": { aDigits: 4, bDigits: 1, label: "4 x 1" },
      "2x2": { aDigits: 2, bDigits: 2, label: "2 x 2" }
    };

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomWithDigits(digits) {
      if (digits === 1) return randInt(2, 9);
      const min = Math.pow(10, digits - 1);
      const max = Math.pow(10, digits) - 1;
      return randInt(min, max);
    }

    function splitPlaceParts(value, digits) {
      const text = String(Math.max(0, value)).padStart(digits, "0");
      return text.split("").map(function(ch, index) {
        return Number(ch) * Math.pow(10, digits - index - 1);
      });
    }

    function buildProblem(cfg) {
      return { a: randomWithDigits(cfg.aDigits), b: randomWithDigits(cfg.bDigits) };
    }

    function toneClass(index) {
      return "tone-" + (index % 4);
    }

    function rightAlignDigits(value, cols) {
      const arr = new Array(cols).fill("&nbsp;");
      const text = String(value);
      let index = cols - text.length;
      for (const ch of text) {
        if (index >= 0 && index < cols) arr[index] = ch;
        index += 1;
      }
      return arr;
    }

    function buildAreaModel(problem, cfg) {
      const aParts = splitPlaceParts(problem.a, cfg.aDigits);
      const bParts = splitPlaceParts(problem.b, cfg.bDigits);

      const topCols = aParts.map(function(part) {
        return '<div class="pv-box">' + part + "</div>";
      }).join("");

      const leftRows = bParts.map(function(part) {
        return '<div class="pv-box">' + part + "</div>";
      }).join("");

      const areaCells = [];
      for (let r = 0; r < bParts.length; r += 1) {
        for (let c = 0; c < aParts.length; c += 1) {
          areaCells.push(
            '<div class="area-cell ' + toneClass((r * aParts.length) + c) + '">' +
              '<div class="eq-line">' + bParts[r] + " x " + aParts[c] + " =</div>" +
              '<span class="blank-line"></span>' +
            "</div>"
          );
        }
      }

      return (
        '<section class="area-panel">' +
          '<h3 class="area-title">Area Model / Partial Products</h3>' +
          '<div class="area-top-grid" style="grid-template-columns: 70px repeat(' + aParts.length + ', 1fr);">' +
            "<div></div>" + topCols +
          "</div>" +
          '<div class="area-main">' +
            '<div class="area-left-wrap" style="grid-template-rows: repeat(' + bParts.length + ', 1fr);">' + leftRows + "</div>" +
            '<div class="area-grid" style="grid-template-columns: repeat(' + aParts.length + ', 1fr); grid-template-rows: repeat(' + bParts.length + ', 1fr);">' + areaCells.join("") + "</div>" +
          "</div>" +
        "</section>"
      );
    }

    function buildMultiples(problem, cfg, filled) {
      if (cfg.bDigits !== 1) {
        return (
          '<section class="multiples-block">' +
            '<h3 class="multiples-title">Multiples Helper</h3>' +
            '<div style="font-size:16px;font-weight:700;">Multiples helper is shown for 1-digit multipliers.</div>' +
          "</section>"
        );
      }

      const base = problem.b;
      const headers = Array.from({ length: 10 }, function(_, i) {
        return "<td>x" + (i + 1) + "</td>";
      }).join("");
      const values = Array.from({ length: 10 }, function(_, i) {
        return filled
          ? "<td>" + (base * (i + 1)) + "</td>"
          : '<td><span class="multiple-blank"></span></td>';
      }).join("");

      return (
        '<section class="multiples-block">' +
          '<h3 class="multiples-title">Multiples Helper (' + base + ')</h3>' +
          '<table class="multiples-table" aria-label="Multiples helper table">' +
            "<tr>" + headers + "</tr>" +
            "<tr>" + values + "</tr>" +
          "</table>" +
        "</section>"
      );
    }

    function buildAdditionTable(problem, cfg) {
      const aParts = splitPlaceParts(problem.a, cfg.aDigits);
      const bParts = splitPlaceParts(problem.b, cfg.bDigits);

      const partials = [];
      for (let r = 0; r < bParts.length; r += 1) {
        for (let c = 0; c < aParts.length; c += 1) {
          partials.push({
            leftPart: bParts[r],
            topPart: aParts[c],
            shift: (cfg.aDigits - c - 1) + (cfg.bDigits - r - 1),
            tone: toneClass((r * aParts.length) + c)
          });
        }
      }

      const productDigits = String(problem.a * problem.b).length;
      const partialMax = partials.reduce(function(max, part) {
        const length = String(Math.abs(part.leftPart * part.topPart)).length;
        return Math.max(max, length);
      }, productDigits);
      const cols = Math.max(3, partialMax);

      const setupA = rightAlignDigits(problem.a, cols);
      const setupB = rightAlignDigits(problem.b, cols);

      function rowHtml(sign, cells, className) {
        return '<tr><td class="add-sign">' + sign + "</td>" + cells.map(function(value) {
          return '<td class="add-cell ' + (className || "") + '">' + value + "</td>";
        }).join("") + "</tr>";
      }

      const partialRows = partials.map(function(part, index) {
        const cells = new Array(cols).fill("&nbsp;");
        for (let i = 0; i < Math.min(part.shift, cols); i += 1) {
          cells[cols - 1 - i] = "0";
        }
        const sign = index === partials.length - 1 ? "+" : "&nbsp;";
        return rowHtml(sign, cells, "partial " + part.tone);
      }).join("");

      const lineRow = '<tr class="add-separator"><td class="add-sign">&nbsp;</td><td class="add-line" colspan="' + cols + '"></td></tr>';

      return (
        '<section class="addition-panel">' +
          '<h3 class="addition-title">Add Partial Products</h3>' +
          '<table class="addition-table" aria-label="Addition part table">' +
            rowHtml("&nbsp;", setupA, "") +
            rowHtml("&times;", setupB, "") +
            lineRow +
            partialRows +
            rowHtml("&nbsp;", new Array(cols).fill("&nbsp;"), "") +
          "</table>" +
        "</section>"
      );
    }

    function updateHint(cfg, filled) {
      const fillText = filled ? "Multiples values prefilled." : "Multiples values left blank.";
      $("hint").textContent = "Generating " + cfg.label + " partial products preview. " + fillText;
    }

    function build() {
      const type = $("problemType").value;
      const cfg = TYPE_CONFIG[type] || TYPE_CONFIG["2x1"];
      const filled = $("fillMultiplesValues").value === "yes";
      const problem = buildProblem(cfg);

      $("worksheetHost").innerHTML = [
        '<article class="page">',
        '<header class="sheet-header">',
        '<h2 class="sheet-title">Partial Products Organizer</h2>',
        '<div class="name-line">Name:<span class="line"></span></div>',
        "</header>",
        '<article class="problem-card">',
        '<div class="problem-top">',
        '<div class="problem-id">Problem 1</div>',
        '<div class="problem-eq">' + problem.a + " x " + problem.b + "</div>",
        "</div>",
        '<div class="workspace-row">',
        buildAreaModel(problem, cfg),
        buildAdditionTable(problem, cfg),
        "</div>",
        buildMultiples(problem, cfg, filled),
        "</article>",
        '<div class="sheet-footer">Students solve using area model, partial products, and the addition part.</div>',
        '<div class="copyright">Copyright - InterventionStation.com - @TeachwithMrC</div>',
        '<div class="preview-overlay" aria-hidden="true"></div>',
        '<div class="members-lock">',
        '<p class="members-lock-title">Members Only</p>',
        '<p class="members-lock-copy">Generate is enabled in preview mode. Join membership to unlock full worksheet visibility and printing.</p>',
        '<a href="https://member.interventionstation.com/join" target="_blank" rel="noopener noreferrer">Join Membership</a>',
        "</div>",
        "</article>"
      ].join("");

      updateHint(cfg, filled);
    }

    function lockedPreviewAction() {
      alert("This feature is locked in Preview Mode.\nPlease join membership for full worksheet access.");
    }

    function blockShortcuts(event) {
      const blocked = (event.ctrlKey || event.metaKey) && ["p", "s", "u"].includes(event.key.toLowerCase());
      if (blocked) event.preventDefault();
    }

    document.addEventListener("keydown", blockShortcuts);
    $("btnGen").addEventListener("click", build);
