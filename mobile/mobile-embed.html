<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Intervention Station | Reading Generators</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./mobile-embed.css">
</head>
<body>
  <main class="me-page">
    <section class="me-shell">
      <header class="me-header">
        <p class="me-kicker">Preview a Few Reading Generators</p>
        <h1>Reading Generators</h1>
        <p class="me-copy">Choose a sample generator below. The preview fills the mobile width and stays focused on the reading tools that are working best.</p>
      </header>

      <nav class="me-picker" aria-label="Reading generator picker">
        <button class="me-pill is-active" data-item="fluency-grid" type="button">Fluency Grid</button>
        <button class="me-pill" data-item="word-mapping" type="button">Word Mapping</button>
        <button class="me-pill" data-item="word-ladder" type="button">Word Ladder</button>
        <button class="me-pill" data-item="roll-and-read" type="button">Roll and Read</button>
        <button class="me-pill" data-item="pyramid-spelling" type="button">Pyramid Spelling</button>
      </nav>

      <section id="generator-browser" class="me-stage" aria-label="Generator preview">
        <div class="me-stage__frame" id="previewViewport">
          <iframe
            id="previewFrame"
            class="me-iframe"
            title="Reading Generators - Fluency Grid"
            loading="lazy"
            src="https://teachwithmrc.github.io/mobile/generators/fluency-grid.html"
          ></iframe>
        </div>
      </section>
    </section>
  </main>

  <script src="./mobile-embed.js"></script>
</body>
</html>
