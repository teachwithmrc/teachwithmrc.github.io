<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pyramid Spelling Mobile Preview</title>

  <script src="https://teachwithmrc.github.io/newtry_FULL.js" defer></script>
  <script src="https://teachwithmrc.github.io/fluencyDataFull_v8-2_clean.js" defer></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: "BoxesFont";
      src: url("https://teachwithmrc.github.io/fonts/boxes2.otf") format("opentype"),
           url("fonts/boxes.ttf") format("truetype");
    }

    :root {
      --ink: #1f365f;
      --line: #d7dfec;
      --panel: #ffffff;
      --bg: #f3f5f7;
      --blue: #1976d2;
      --blue-dark: #1976d2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Poppins", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      padding: 0;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 12px;
    }

    .top {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 8px 22px rgba(16, 24, 40, 0.08);
      margin-bottom: 10px;
    }

    .top-head { margin-bottom: 10px; }

    h1 {
      margin: 0 0 4px;
      font-size: clamp(24px, 7vw, 34px);
      line-height: 1.05;
      font-weight: 900;
      text-align: center;
    }

    .subtitle {
      color: #35516f;
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      text-align: center;
    }

    .btns {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }

    button {
      flex: 1;
      min-height: 50px;
      border-radius: 12px;
      border: 2px solid #111;
      font: inherit;
      font-weight: 700;
      font-size: 17px;
      padding: 0 12px;
      cursor: pointer;
      background: #fff;
    }

    #btnGenerate {
      background: #6ec1ff;
      color: #fff;
      border-color: #111;
    }

    #btnPrint { color: #111; border-color: #111; }

    #modeRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .mode-option {
      border: 1px solid #b7c9df;
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      background: #f7fbff;
      user-select: none;
      line-height: 1.2;
    }

    .mode-option input { display: none; }

    .mode-option.selected {
      background: #dcecff;
      border-color: #6ea7e8;
      color: #23466f;
    }

    .promo-note {
      margin: 8px 0 0;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      color: #2f4d73;
      text-align: center;
    }

    .preview {
      position: relative;
      background: #fff;
      border: 2px solid #000;
      border-radius: 12px;
      overflow: hidden;
      min-height: 400px;
    }

    #printArea {
      position: relative;
      z-index: 1;
    }

    .page {
      width: 100%;
      min-height: 680px;
      padding: 12px 10px 110px;
      border-bottom: 2px dashed #9db4cf;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      margin-bottom: 5px;
    }

    .name-line {
      flex: 1;
      border-bottom: 2px solid #000;
      height: 0;
    }

    .page-title {
      margin: 2px 0 7px;
      text-align: center;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }

    .pyramid-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    .pyramid-card {
      border: 1.5px solid #111;
      border-radius: 8px;
      padding: 7px 6px;
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 6px;
      align-items: start;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .card-num {
      font-weight: 700;
      font-size: 0.8rem;
      line-height: 1.2;
    }

    .sound-only-wrap {
      display: grid;
      justify-items: center;
      row-gap: 5px;
    }

    .sound-only-wrap.left {
      justify-items: start;
    }

    .sound-word {
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: 0.01em;
      text-transform: lowercase;
    }

    .sound-stack {
      display: grid;
      gap: 1px;
      justify-items: center;
    }

    .sound-stack.left {
      justify-items: start;
    }

    .sound-line {
      line-height: 1;
      font-weight: 400;
      letter-spacing: 0.02em;
      font-family: "BoxesFont", "Poppins", sans-serif;
      white-space: nowrap;
    }

    .target-word {
      text-align: center;
      font-weight: 800;
      font-size: 1.8rem;
      line-height: 1.1;
      margin: 0 0 8px;
      text-transform: lowercase;
    }

    .pyramid-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .p-row {
      display: flex;
      justify-content: center;
      line-height: 1;
    }

    .p-cell {
      min-width: 32px;
      height: 30px;
      border: 1.6px solid #111;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 600;
      font-family: "BoxesFont", "Poppins", sans-serif;
      text-align: center;
      padding: 0 4px;
      background: #fff;
    }

    .footer {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 84px;
      text-align: center;
      font-size: 0.62rem;
      letter-spacing: 0.01em;
      color: #1d2b41;
      z-index: 2;
    }

    .watermark {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg width='220' height='220' viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='120' fill='%23000000' opacity='0.12' transform='rotate(-38 110 110)' font-family='Poppins' font-weight='800' font-size='28'%3EPREVIEW%3C/text%3E%3C/svg%3E");
      background-size: 220px 220px;
      background-repeat: repeat;
    }

    .lock-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 5;
      background: rgba(9, 18, 30, 0.94);
      color: #fff;
      text-align: center;
      padding: 10px 10px 12px;
      border-top: 2px solid #fff;
    }

    .lock-title {
      font-size: 0.95rem;
      font-weight: 800;
      margin: 0 0 5px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .lock-copy {
      margin: 0 0 8px;
      font-size: 0.75rem;
      line-height: 1.25;
      font-weight: 600;
    }

    .join-btn {
      display: inline-block;
      text-decoration: none;
      color: #051426;
      background: #fff;
      border: 2px solid #fff;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.76rem;
      font-weight: 800;
    }

    @media print {
      body { display: none !important; }
    }
  </style>
<style>
  .mf-topbar,
  .organizer-nav,
  .top-cta-wrap,
  .is-ticker,
  .top-buttons-row,

<style>
  .print-lock-modal[hidden] { display: none; }
  .print-lock-modal {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: grid;

  .print-lock-modal__dialog {

  .print-lock-modal__title {

  .print-lock-modal__actions {

  .is-home-btn.is-home-btn--primary {

</head>
<body>
  <main class="app">
    <section class="top" aria-label="Controls">
      <div class="top-head">
        <h1>Pyramid Spelling Worksheet Generator</h1>
        <p class="subtitle">Skill: Variant Vowels Mixed.</p>
      </div>
      <div class="btns">
        <button id="btnGenerate" type="button">Generate</button>
        <button id="btnPrint" type="button">Print</button>
      </div>
      <p class="promo-note">Choose or pick more than 40 phonics skills or combine sets.</p>
      <div id="modeRow" role="radiogroup" aria-label="Layout mode">
        <label class="mode-option selected" data-layout="pyramid">
          <input type="radio" name="layoutMode" value="pyramid" checked>
          Pyramid (By Letter)
        </label>
        <label class="mode-option" data-layout="left">
          <input type="radio" name="layoutMode" value="left">
          Left Aligned (By Sound)
        </label>
      </div>
    </section>

    <section class="preview" aria-label="Worksheet preview">
      <div id="printArea"></div>
      <div class="watermark" aria-hidden="true"></div>
      <div class="lock-panel" aria-hidden="false">
        <p class="lock-title">Members Only</p>
        <p class="lock-copy">Printing is for Members of Intervention Station Only.</p>
        <a class="is-home-btn is-home-btn--primary" href="#two-setp-order-jsU2cbJJk-">Join</a>
      </div>
    </section>
  </main>

  <div class="print-lock-modal" id="printLockModal" hidden>
    <div class="print-lock-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="printLockTitle">
      <p class="print-lock-modal__title" id="printLockTitle">Printing is for Members of Intervention Station Only.</p>
      <div class="print-lock-modal__actions">
        <button type="button" class="print-lock-modal__dismiss" id="printLockDismiss">Dismiss</button>
        <a class="is-home-btn is-home-btn--primary" href="#two-setp-order-jsU2cbJJk-">Join</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const FORCED_SKILL = "Variant Vowels Mixed";
      const FORCED_BUILD_MODE = "sound";
      const MAX_WORDS = 6;
      const CARDS_PER_PAGE = 6;

      const state = {
        mode: FORCED_BUILD_MODE,
        blendMode: "mix",
        soundLayout: "pyramid",
        soundPerPage: CARDS_PER_PAGE,
        skillPool: [],
        poolSignature: "",
        randomOrder: [],
        randomCursor: 0
      };

      const printArea = document.getElementById("printArea");
      const modeRow = document.getElementById("modeRow");
      const btnGenerate = document.getElementById("btnGenerate");
      const btnPrint = document.getElementById("btnPrint");
      const printLockModal = document.getElementById("printLockModal");
      const printLockDismiss = document.getElementById("printLockDismiss");

      function closePrintLockModal() {
        if (!printLockModal) return;
        printLockModal.hidden = true;
        document.body.classList.remove("print-lock-modal-open");
      }

      function showPrintLockModal() {
        if (!printLockModal) return;
        printLockModal.hidden = false;
        document.body.classList.add("print-lock-modal-open");
      }

      printLockDismiss?.addEventListener("click", closePrintLockModal);
      printLockModal?.addEventListener("click", (event) => {
        if (event.target === printLockModal) closePrintLockModal();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && printLockModal && !printLockModal.hidden) {
          closePrintLockModal();
        }
      });

      const SOUND_CHUNKS = [
        "eigh", "igh", "air", "are", "ear", "ure", "tch", "dge", "tion", "sion",
        "qu", "ff", "ll", "ss", "zz", "tt", "pp", "bb", "dd", "gg", "mm", "nn", "rr",
        "ch", "sh", "th", "wh", "ck", "ng", "nk", "ee", "ea", "oa", "ow", "oe",
        "ai", "ay", "oi", "oy", "ou", "aw", "au", "er", "ir", "ur", "ar", "or",
        "oo", "ew", "ue", "ie"
      ];

      function normalizeAlpha(word) {
        return String(word || "").toLowerCase().replace(/[^a-z]/g, "");
      }

      function sanitizeWordToken(raw) {
        const token = String(raw || "").replace(/[’]/g, "'").toLowerCase().trim();
        if (!/^[a-z]+(?:'[a-z]+)?$/.test(token)) return "";
        const alphaLen = token.replace(/[^a-z]/g, "").length;
        if (alphaLen < 2 || alphaLen > 15) return "";
        return token;
      }

      function sanitizeSplitPart(raw) {
        const token = String(raw || "").replace(/[’]/g, "'").toLowerCase().trim();
        if (!/^[a-z]+(?:'[a-z]+)?$/.test(token)) return "";
        return token;
      }

      function normalizePattern(patternRaw) {
        const value = String(patternRaw || "").replace(/[^0-9]/g, "");
        if (!value) return "";
        if (value.length < 1 || value.length > 15) return "";
        return value;
      }

      function addPattern(entry, patternRaw) {
        const pattern = normalizePattern(patternRaw);
        if (!pattern) return;
        if (!entry.patternSet.has(pattern)) {
          entry.patternSet.add(pattern);
          entry.patterns.push(pattern);
        }
      }

      function addWord(word, splitParts, collector, patternValue) {
        const cleanWord = sanitizeWordToken(word);
        if (!cleanWord) return;
        let entry = collector.get(cleanWord);
        if (!entry) {
          entry = {
            key: cleanWord,
            word: cleanWord,
            splits: [],
            splitKeys: new Set(),
            patterns: [],
            patternSet: new Set()
          };
          collector.set(cleanWord, entry);
        }
        addPattern(entry, patternValue);

        if (Array.isArray(splitParts) && splitParts.length) {
          const normalizedParts = splitParts
            .map((part) => sanitizeSplitPart(String(part || "").replace(/[^a-zA-Z']/g, "")))
            .filter(Boolean);
          if (!normalizedParts.length) return;
          const joined = normalizedParts.join("");
          const cleanAlpha = normalizeAlpha(cleanWord);
          if (joined !== cleanAlpha) return;
          const splitKey = normalizedParts.join("|");
          if (entry.splitKeys.has(splitKey)) return;
          entry.splitKeys.add(splitKey);
          entry.splits.push(normalizedParts);
          const derivedPattern = normalizedParts.map((part) => String(normalizeAlpha(part).length || 1)).join("");
          addPattern(entry, derivedPattern);
        }
      }

      function dedupe(list) {
        const seen = new Set();
        const out = [];
        for (const w of list) {
          const key = (w && w.word && w.pattern) ? (w.word + "|" + w.pattern) : JSON.stringify(w);
          if (!seen.has(key)) {
            seen.add(key);
            out.push(w);
          }
        }
        return out;
      }

      function getWordsForSkill(skill, source, blendMode) {
        const blendSuffixes = [" with Blends", " with Digraphs and Blends"];

        function fetchBase(base) {
          const baseWords = source[base] || [];
          let blendWords = [];
          blendSuffixes.forEach((suffix) => {
            const key = base + suffix;
            if (source[key]) blendWords = blendWords.concat(source[key]);
          });
          if (blendMode === "blends") return blendWords;
          if (blendMode === "mix") return dedupe([].concat(baseWords, blendWords));
          return baseWords;
        }

        switch (skill) {
          case "Variant Vowels Mixed":
            return dedupe([].concat(
              fetchBase("Variant Vowels Mixed"),
              fetchBase("Variant Vowels (au/aw)"),
              fetchBase("Variant Vowel (oo)"),
              fetchBase("Variant Vowel(aw)"),
              fetchBase("Variant Vowel(au)"),
              fetchBase("Variant Vowel(oo)")
            ));
          default:
            return fetchBase(skill);
        }
      }

      function buildSkillPool() {
        if (typeof window.soundBoxWords === "undefined") return [];

        const collector = new Map();
        const words = getWordsForSkill(FORCED_SKILL, window.soundBoxWords, state.blendMode);

        words.forEach((item) => {
          if (item && typeof item === "object") {
            addWord(item.word, item.split, collector, item.pattern);
          } else {
            addWord(item, null, collector);
          }
        });

        return Array.from(collector.values())
          .map((entry) => ({
            key: entry.key,
            word: entry.word,
            splits: entry.splits.slice(),
            patterns: entry.patterns.slice()
          }))
          .sort((a, b) => {
            if (a.word.length !== b.word.length) return a.word.length - b.word.length;
            return a.word.localeCompare(b.word);
          });
      }

      function shuffle(array) {
        const copy = array.slice();
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          const temp = copy[i];
          copy[i] = copy[j];
          copy[j] = temp;
        }
        return copy;
      }

      function computePoolSignature(list) {
        return list.map((entry) => entry.key).join("|");
      }

      function nextWordBatch(eligible, count) {
        if (!eligible.length) return [];
        if (eligible.length <= count) return eligible.slice();

        const signature = computePoolSignature(eligible.map((item) => item.entry));
        if (state.poolSignature !== signature || !state.randomOrder.length) {
          state.poolSignature = signature;
          state.randomOrder = shuffle(Array.from({ length: eligible.length }, (_, i) => i));
          state.randomCursor = 0;
        }

        if (state.randomCursor + count > state.randomOrder.length) {
          state.randomOrder = shuffle(Array.from({ length: eligible.length }, (_, i) => i));
          state.randomCursor = 0;
        }

        const indexes = state.randomOrder.slice(state.randomCursor, state.randomCursor + count);
        state.randomCursor += count;
        return indexes.map((index) => eligible[index]);
      }

      function segmentBySound(word) {
        const clean = normalizeAlpha(word);
        if (!clean) return [];

        const vowels = new Set(["a", "e", "i", "o", "u"]);
        const consonants = new Set(["b", "c", "d", "f", "g", "h", "j", "k", "l", "m", "n", "p", "q", "r", "s", "t", "v", "w", "x", "y", "z"]);
        const hasLikelySilentETail =
          clean.length >= 3 &&
          clean.endsWith("e") &&
          consonants.has(clean[clean.length - 2]) &&
          vowels.has(clean[clean.length - 3]);

        const scanLimit = hasLikelySilentETail ? clean.length - 2 : clean.length;
        const parts = [];
        let index = 0;

        while (index < scanLimit) {
          let found = "";
          for (const chunk of SOUND_CHUNKS) {
            if (clean.startsWith(chunk, index)) {
              found = chunk;
              break;
            }
          }
          if (found) {
            parts.push(found);
            index += found.length;
          } else {
            parts.push(clean[index]);
            index += 1;
          }
        }

        if (hasLikelySilentETail) {
          parts.push(clean.slice(-2));
        }

        return parts;
      }

      function pickSplitForSound(entry) {
        if (!entry || !Array.isArray(entry.splits) || !entry.splits.length) return null;
        const sorted = entry.splits.slice().sort((a, b) => b.length - a.length);
        return sorted[0] || null;
      }

      function normalizeSourceSplit(split) {
        if (!Array.isArray(split) || !split.length) return [];
        const cleaned = split
          .map((unit) => sanitizeSplitPart(unit))
          .filter(Boolean);
        if (!cleaned.length) return [];
        if (cleaned.length > 1) return cleaned;
        return segmentBySound(cleaned[0]);
      }

      function getUnits(entry) {
        const split = pickSplitForSound(entry);
        const normalized = normalizeSourceSplit(split);
        if (normalized.length) return normalized;
        return segmentBySound(entry.word);
      }

      function getLetterUnits(entry) {
        return normalizeAlpha(entry.word).split("").filter(Boolean);
      }

      function getPatternGuide(entry, units) {
        if (!Array.isArray(units) || !units.length) return "";

        const derived = units.map((unit) => String(Math.max(1, normalizeAlpha(unit).length))).join("");
        const numericCandidates = (Array.isArray(entry.patterns) ? entry.patterns : [])
          .map((p) => String(p))
          .filter((p) => /^\d+$/.test(p));

        if (!numericCandidates.length) return derived;
        const exact = numericCandidates.find((p) => p === derived);
        if (exact) return exact;
        const sameLength = numericCandidates.find((p) => p.length === units.length);
        if (sameLength) return sameLength;
        return numericCandidates[0];
      }

      function getSoundFontSizes(item) {
        const guideLen = (item.patternGuide || "").length || Math.max(1, item.units.length);
        const wordLen = normalizeAlpha(item.entry.word).length;

        let line = 44 - Math.max(0, guideLen - 3) * 6;
        let word = 26 - Math.max(0, guideLen - 3) * 1.2;
        if (wordLen >= 7) word -= Math.min(4, (wordLen - 6) * 0.6);

        return {
          line: Math.max(28, line),
          word: Math.max(18, word)
        };
      }

      function makeSoundStackBlock(item) {
        const wrap = document.createElement("div");
        wrap.className = "sound-only-wrap " + (state.soundLayout === "left" ? "left" : "pyramid");

        const sizes = getSoundFontSizes(item);
        const wordLine = document.createElement("div");
        wordLine.className = "sound-word";
        wordLine.textContent = item.entry.word;
        wordLine.style.fontSize = sizes.word + "px";
        wrap.appendChild(wordLine);

        const stack = document.createElement("div");
        stack.className = "sound-stack " + (state.soundLayout === "left" ? "left" : "pyramid");

        const fallbackGuide = (Array.isArray(item.units) ? item.units : [])
          .map((unit) => String(Math.max(1, normalizeAlpha(unit).length)))
          .join("");
        const guide = /^\d+$/.test(String(item.patternGuide || "")) ? String(item.patternGuide) : fallbackGuide;
        const leftWidth = Math.max(1.4, guide.length * 1.05) + "ch";

        for (let i = 1; i <= guide.length; i += 1) {
          const line = document.createElement("div");
          line.className = "sound-line";
          line.style.width = state.soundLayout === "left"
            ? leftWidth
            : (Math.max(1.4, i * 1.05) + "ch");
          line.style.fontSize = sizes.line + "px";
          line.style.textAlign = state.soundLayout === "left" ? "left" : "center";
          line.style.lineHeight = "0.84";
          line.textContent = guide.slice(0, i);
          stack.appendChild(line);
        }

        wrap.appendChild(stack);
        return wrap;
      }

      function getLetterCellMetrics(units) {
        const count = units.length;
        const longest = units.reduce((max, item) => Math.max(max, String(item).length), 1);
        let height = 30;
        if (count >= 10) height = 22;
        else if (count >= 8) height = 24;
        else if (count >= 6) height = 27;

        const width = Math.min(72, Math.max(30, 14 + longest * 10));
        const font = Math.max(14, Math.min(20, height * 0.66));
        return { height, width, font };
      }

      function makeLetterPyramid(units) {
        const wrap = document.createElement("div");
        wrap.className = "pyramid-wrap";

        for (let row = 1; row <= units.length; row += 1) {
          const rowEl = document.createElement("div");
          rowEl.className = "p-row";
          for (let i = 0; i < row; i += 1) {
            const cell = document.createElement("div");
            cell.className = "p-cell";
            cell.textContent = "";
            rowEl.appendChild(cell);
          }
          wrap.appendChild(rowEl);
        }

        return wrap;
      }

      function makeLetterBlock(item) {
        const wrap = document.createElement("div");
        const word = document.createElement("div");
        word.className = "target-word";
        word.textContent = item.entry.word;
        wrap.appendChild(word);

        const metrics = getLetterCellMetrics(item.units);
        wrap.style.setProperty("--letter-cell-h", metrics.height + "px");
        wrap.style.setProperty("--letter-cell-w", metrics.width + "px");
        wrap.style.setProperty("--letter-cell-font", metrics.font + "px");

        const pyramid = makeLetterPyramid(item.units);
        pyramid.querySelectorAll(".p-cell").forEach((cell) => {
          cell.style.height = "var(--letter-cell-h)";
          cell.style.minWidth = "var(--letter-cell-w)";
          cell.style.fontSize = "var(--letter-cell-font)";
        });
        wrap.appendChild(pyramid);
        return wrap;
      }

      function chunk(list, size) {
        const out = [];
        for (let i = 0; i < list.length; i += size) {
          out.push(list.slice(i, i + size));
        }
        return out;
      }

      function buildPage(items, pageNo, totalPages) {
        const page = document.createElement("div");
        page.className = "page";

        const nameRow = document.createElement("div");
        nameRow.className = "name-row";
        nameRow.innerHTML = "<span>Name:</span><span class='name-line' aria-hidden='true'></span>";
        page.appendChild(nameRow);

        const title = document.createElement("h2");
        title.className = "page-title";
        title.textContent = "Pyramid Spelling";
        page.appendChild(title);

        const grid = document.createElement("div");
        grid.className = "pyramid-grid";

        items.forEach((item, index) => {
          const card = document.createElement("div");
          card.className = "pyramid-card";

          const number = document.createElement("div");
          number.className = "card-num";
          number.textContent = String(index + 1 + ((pageNo - 1) * state.soundPerPage)) + ".";
          card.appendChild(number);

          if (state.soundLayout === "pyramid") {
            card.appendChild(makeLetterBlock(item));
          } else {
            card.appendChild(makeSoundStackBlock(item));
          }
          grid.appendChild(card);
        });

        page.appendChild(grid);

        const footer = document.createElement("div");
        footer.className = "footer";
        footer.textContent = "Copyright - InterventionStation.com - @TeachwithMrC | Page " + pageNo + " of " + totalPages;
        page.appendChild(footer);

        return page;
      }

      function syncLayoutUi() {
        modeRow.querySelectorAll(".mode-option").forEach((option) => {
          const selected = option.getAttribute("data-layout") === state.soundLayout;
          option.classList.toggle("selected", selected);
          const input = option.querySelector("input");
          if (input) input.checked = selected;
        });
      }

      function generateWorksheet() {
        state.mode = FORCED_BUILD_MODE;
        state.skillPool = buildSkillPool();
        const eligible = state.skillPool
          .map((entry) => {
            const units = state.soundLayout === "pyramid" ? getLetterUnits(entry) : getUnits(entry);
            return { entry, units, patternGuide: getPatternGuide(entry, units) };
          })
          .filter((item) => item.units.length > 0);

        const items = nextWordBatch(eligible, MAX_WORDS);

        printArea.innerHTML = "";

        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "page";
          empty.innerHTML = "<h2 class='page-title'>Pyramid Spelling</h2><p style='text-align:center;font-size:.9rem;'>No preview words available for Variant Vowels Mixed.</p>";
          printArea.appendChild(empty);
          return;
        }

        const chunks = chunk(items, state.soundPerPage);
        const totalPages = chunks.length;

        chunks.forEach((group, idx) => {
          printArea.appendChild(buildPage(group, idx + 1, totalPages));
        });
      }

      modeRow.addEventListener("click", (event) => {
        const mode = event.target.closest(".mode-option");
        if (!mode) return;
        const layout = mode.getAttribute("data-layout");
        if (!layout) return;
        state.soundLayout = layout === "left" ? "left" : "pyramid";
        syncLayoutUi();
        generateWorksheet();
      });

      btnGenerate.addEventListener("click", () => {
        state.mode = FORCED_BUILD_MODE;
        generateWorksheet();
      });

      btnPrint.addEventListener("click", () => {
        showPrintLockModal();
      });

      syncLayoutUi();

      // Auto-generate on load using forced settings.
      state.mode = FORCED_BUILD_MODE;
      generateWorksheet();
    });
  </script>
</body>
</html>
