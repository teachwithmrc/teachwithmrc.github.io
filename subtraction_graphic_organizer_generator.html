<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subtraction Graphic Organizer Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/subtraction-graphic-organizer-generator.css">
</head>
<body>
  <div class="app">
    <div class="screen-only">
      <h1>Subtraction Graphic Organizer Generator</h1>
      <p class="subtitle">Advanced format: auto layout with 2-3 problems per row and aligned subtraction tables</p>

      <section class="controls-card">
        <div class="controls-grid">
          <div class="field">
            <label for="digitsA">Minuend Digits</label>
            <select id="digitsA">
              <option value="2" selected>2 digits</option>
              <option value="3">3 digits</option>
              <option value="4">4 digits</option>
              <option value="5">5 digits</option>
              <option value="6">6 digits</option>
            </select>
          </div>

          <div class="field">
            <label for="digitsB">Subtrahend Digits</label>
            <select id="digitsB">
              <option value="1" selected>1 digit</option>
              <option value="2">2 digits</option>
              <option value="3">3 digits</option>
              <option value="4">4 digits</option>
              <option value="5">5 digits</option>
              <option value="6">6 digits</option>
            </select>
          </div>

          <div class="field">
            <label for="problemMode">Problem Source</label>
            <select id="problemMode">
              <option value="random" selected>Random problems</option>
              <option value="custom">Custom problems</option>
            </select>
          </div>

          <div class="field">
            <label for="customProblem">Custom Problems (up to 9)</label>
            <input id="customProblem" type="text" placeholder="Example: 76-4, 58-9, 43-7, 91-8, 67-5, 84-6" />
          </div>

          <div class="field">
            <label for="sheetTitle">Worksheet Title</label>
            <input id="sheetTitle" type="text" value="Subtraction Graphic Organizer" />
          </div>

          <div class="field">
            <label>Color Coding</label>
            <label class="checkbox-wrap"><input id="colorToggle" type="checkbox" checked />Use faint place-value colors</label>
          </div>

          <div class="field">
            <label>Equation Label</label>
            <label class="checkbox-wrap"><input id="showProblemEq" type="checkbox" checked />Show boxed problem equation</label>
          </div>

          <div class="field">
            <label>Scaffold Version</label>
            <label class="checkbox-wrap"><input id="scaffoldToggle" type="checkbox" />Fill minuend/subtrahend numbers in table boxes</label>
          </div>

          <div class="field">
            <label>Borrowing</label>
            <label class="checkbox-wrap"><input id="requireBorrowing" type="checkbox" />Use borrowing problems</label>
          </div>
        </div>

        <div class="button-row">
          <button id="generateBtn" class="primary" type="button">Generate</button>
          <button id="printBtn" type="button">Print</button>
        </div>

        <div class="note" id="statusText">Tip: custom mode accepts comma-separated equations like <strong>537268-37917, 86421-5678</strong>.</div>
      </section>
    </div>

    <div id="worksheetHost"></div>
  </div>
  <script src="/subtraction-graphic-organizer-generator.js" defer></script>
</body>
</html>
