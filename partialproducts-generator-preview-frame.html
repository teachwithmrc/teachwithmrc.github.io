<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partial Products Generator - PREVIEW FRAME</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1f365f;
      --bg: #f3f5f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Poppins", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    .preview-host {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 1200px;
      background: #fff;
      overflow: hidden;
      border: 2px solid #111;
    }

    .generator-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .preview-watermark {
      position: absolute;
      left: 0;
      right: 0;
      top: 420px;
      bottom: 0;
      z-index: 118;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.02);
      background-image: url("data:image/svg+xml,%3Csvg width='250' height='250' viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='20' y='150' fill='%23000' opacity='0.12' transform='rotate(-45 125 125)' font-family='Poppins' font-weight='900' font-size='30'%3EPREVIEW MODE%3C/text%3E%3C/svg%3E");
    }

    .preview-paywall {
      position: absolute;
      left: 0;
      right: 0;
      top: 520px;
      bottom: 0;
      z-index: 120;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 14px;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(0, 0, 0, 0.74) 34%, rgba(0, 0, 0, 0.9));
    }

    .preview-paywall-card {
      width: min(94%, 560px);
      border: 2px solid #fff;
      border-radius: 14px;
      background: rgba(17, 17, 17, 0.95);
      color: #fff;
      text-align: center;
      padding: 14px 14px 12px;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.35);
      pointer-events: auto;
    }

    .preview-paywall-card h3 {
      margin: 0 0 6px;
      font-size: 1.05rem;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .preview-paywall-card p {
      margin: 0 0 10px;
      font-size: 0.82rem;
      line-height: 1.35;
      opacity: 0.95;
      font-weight: 600;
    }

    .preview-paywall-card a {
      display: inline-block;
      text-decoration: none;
      background: #fff;
      color: #111;
      border-radius: 9px;
      padding: 8px 12px;
      font-size: 0.8rem;
      font-weight: 900;
    }

    @media (max-width: 900px) {
      .preview-host {
        min-height: 1080px;
      }
            .preview-watermark {
        top: 360px;
      }
.preview-watermark {
        top: 360px;
      }
      .preview-paywall {
        top: 440px;
      }
    }

    @media print {
      body { display: none !important; }
    }
  </style>
  <script src="preview_customize_toggle_injector.js" defer></script>
  <script src="preview_tryme_mobile_mode.js?v=20260226-tryme5" defer></script>
</head>
<body oncontextmenu="return false;">
  <section class="preview-host" aria-label="Partial Products Generator Preview Frame">
    <iframe
      id="generatorFrame"
      class="generator-frame"
      src="partial_products_2x1_generator.html?v=20260223-preview"
      title="Partial Products Generator"
      loading="eager"
    ></iframe>

    <div class="preview-watermark" aria-hidden="true"></div>

    <div class="preview-paywall" aria-hidden="false">
      <div class="preview-paywall-card">
        <h3>Preview Only</h3>
        <p>Generate is enabled for sampling. Full worksheet visibility and printing are available to members.</p>
        <a href="https://member.interventionstation.com/join" target="_blank" rel="noopener noreferrer">Unlock Full Access</a>
      </div>
    </div>
  </section>

  <script>
    (function () {
      const frame = document.getElementById("generatorFrame");

      function simplifyControls(doc) {
        if (!doc) return;
        const fields = doc.querySelectorAll(".controls-grid .field");
        fields.forEach((field) => {
          field.style.display = "none";
        });

        const problemTypeField = doc.getElementById("problemType")?.closest(".field");
        if (problemTypeField) {
          problemTypeField.style.display = "flex";
        }

        const printBtn = doc.getElementById("printBtn");

        const note = doc.getElementById("statusText");
        if (note) {
          note.style.display = "none";
        }
      }

      function showPrintMembersOnlyNotice() {
        const existing = document.getElementById("membersOnlyPrintNotice");
        if (existing) {
          existing.querySelector("button")?.focus();
          return;
        }

        const overlay = document.createElement("div");
        overlay.id = "membersOnlyPrintNotice";
        overlay.setAttribute("role", "dialog");
        overlay.setAttribute("aria-modal", "true");
        overlay.setAttribute("aria-labelledby", "membersOnlyPrintNoticeTitle");
        overlay.style.cssText = "position:fixed;inset:0;z-index:999999;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(15,23,42,0.48);";

        const panel = document.createElement("div");
        panel.style.cssText = "width:min(420px,100%);background:#fff;border-radius:18px;padding:22px 20px;box-shadow:0 24px 60px rgba(15,23,42,0.24);text-align:center;font-family:inherit;";

        const title = document.createElement("div");
        title.id = "membersOnlyPrintNoticeTitle";
        title.textContent = "Printing is for members only.";
        title.style.cssText = "font-size:1.1rem;font-weight:800;color:#111827;margin-bottom:8px;";

        const body = document.createElement("p");
        body.textContent = "Preview mode lets you generate, but printing is reserved for members.";
        body.style.cssText = "margin:0 0 18px;color:#4b5563;line-height:1.5;";

        const closeBtn = document.createElement("button");
        closeBtn.type = "button";
        closeBtn.textContent = "Close";
        closeBtn.style.cssText = "border:0;border-radius:999px;padding:10px 18px;background:#111827;color:#fff;font:inherit;font-weight:700;cursor:pointer;";

        function closeNotice() {
          overlay.remove();
          document.removeEventListener("keydown", handleKeydown);
        }

        function handleKeydown(event) {
          if (event.key === "Escape") {
            event.preventDefault();
            closeNotice();
          }
        }

        closeBtn.addEventListener("click", closeNotice);
        overlay.addEventListener("click", function (event) {
          if (event.target === overlay) {
            closeNotice();
          }
        });

        panel.appendChild(title);
        panel.appendChild(body);
        panel.appendChild(closeBtn);
        overlay.appendChild(panel);
        document.body.appendChild(overlay);
        document.addEventListener("keydown", handleKeydown);
        closeBtn.focus();
      }

      function lockPrint() {
        try {
          const doc = frame.contentDocument;
          if (!doc) return;

          const printBtn = doc.getElementById("printBtn");
          if (printBtn && !printBtn.dataset.previewPrintNoticeBound) {
            printBtn.dataset.previewPrintNoticeBound = "1";
            printBtn.disabled = false;
            printBtn.removeAttribute("disabled");
            printBtn.textContent = "Print (Members Only)";
            printBtn.style.opacity = "1";
            printBtn.style.cursor = "pointer";
            printBtn.addEventListener("click", function (event) {
              event.preventDefault();
              event.stopImmediatePropagation();
              showPrintMembersOnlyNotice();
            }, true);
          }

          doc.addEventListener("contextmenu", function (event) {
            event.preventDefault();
          });

          simplifyControls(doc);
        } catch (_) {
          // Ignore cross-document errors if iframe origin changes.
        }
      }

      frame.addEventListener("load", lockPrint);
    })();
  </script>
</body>
</html>
