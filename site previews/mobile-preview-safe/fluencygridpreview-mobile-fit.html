<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fluency Grid - Mobile Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --preview-ratio:0.76;
    --frame-scale:0.83;
    --frame-extra-height:780px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; font-family:"Poppins",Arial,sans-serif; color:#111; background:#fff; }
  .wrap{ max-width:460px; margin:0 auto; padding:10px; }

  .controls{ border:2px solid #111; border-radius:12px; padding:12px; margin-bottom:12px; background:#fff; }
  .controls-actions{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btn{ border:2px solid #111; border-radius:14px; height:52px; padding:0 8px; font-family:"Poppins",Arial,sans-serif; font-size:17px; font-weight:900; cursor:pointer; }
  .btn-primary{ background:#6ec1ff; color:#fff; }
  .btn-secondary{ background:#fff; color:#111; }
  .promo-note{ margin:8px 0 0; text-align:center; font-size:13px; font-weight:800; color:#2f4d73; }

  .preview-shell{ position:relative; width:100%; aspect-ratio:var(--preview-ratio); overflow:hidden; border:2px solid #111; background:#fff; }
  .preview-frame{
    position:absolute;
    left:0;
    top:0;
    width:calc(100% / var(--frame-scale));
    height:calc((100% / var(--frame-scale)) + var(--frame-extra-height));
    transform:scale(var(--frame-scale));
    transform-origin:top left;
    border:0;
    background:#fff;
  }
  .preview-watermark{ position:absolute; inset:0; z-index:118; pointer-events:none; opacity:.52; background-image:repeating-linear-gradient(-26deg, rgba(0,0,0,.08) 0 18px, rgba(255,255,255,.06) 18px 36px), url("data:image/svg+xml,%3Csvg width='340' height='220' viewBox='0 0 340 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cg transform='rotate(-22 170 110)'%3E%3Ctext x='18' y='90' fill='%23000' fill-opacity='.26' font-family='Poppins' font-size='34' font-weight='900'%3EPREVIEW ONLY%3C/text%3E%3Ctext x='44' y='146' fill='%23000' fill-opacity='.2' font-family='Poppins' font-size='22' font-weight='800'%3ENOT FOR CLASSROOM USE%3C/text%3E%3C/g%3E%3C/svg%3E"); background-size:auto,340px 220px; background-repeat:repeat; }

  @media (max-width:430px){
    :root{
      --preview-ratio:0.72;
      --frame-scale:0.78;
      --frame-extra-height:900px;
    }
  }
  @media print{ body{ display:none !important; } }
</style>
</head>
<body oncontextmenu="return false;">
<div class="wrap">
  <div class="controls">
    <div class="controls-actions">
      <button type="button" id="btnGen" class="btn btn-primary">Generate Preview</button>
      <button type="button" id="btnPrint" class="btn btn-secondary">Print</button>
    </div>
    <p class="promo-note">Choose or Combine over 40 Phonics Skills</p>
  </div>

  <div class="preview-shell" aria-label="Fluency Grid Preview">
    <iframe id="previewFrame" class="preview-frame" title="Fluency Grid generated preview"></iframe>
    <div class="preview-watermark" aria-hidden="true"></div>
  </div>
</div>

<script>
(function(){
  const SOURCE = "../../fluencygridpreview.html";
  const frame = document.getElementById("previewFrame");
  const btnGen = document.getElementById("btnGen");
  const btnPrint = document.getElementById("btnPrint");

  function getDoc(){
    return frame.contentDocument || frame.contentWindow?.document;
  }

  function forceGeneratedPageOnly(doc){
    if(!doc || doc.getElementById("mobilePreviewFluencyOutputOnly")) return;

    const style = doc.createElement("style");
    style.id = "mobilePreviewFluencyOutputOnly";
    style.textContent = `
      h1, .subtitle, .feature-badge, .controls-wrapper, .no-print, .fomo-overlay { display:none !important; }
      html, body { margin:0 !important; padding:0 !important; background:#fff !important; overflow:visible !important; }
      #output { padding:0 !important; gap:0 !important; }
      #output .page { margin:0 auto !important; max-width:100% !important; box-shadow:none !important; }
    `;
    doc.head.appendChild(style);
  }

  function jumpToOutput(doc){
    const output = doc?.getElementById("output");
    if(output) output.scrollIntoView({ behavior:"auto", block:"start" });
  }

  function clickInnerGenerate(){
    try{
      const doc = getDoc();
      forceGeneratedPageOnly(doc);
      const btn = doc?.getElementById("btnGenerate");
      if(!btn) return false;
      btn.click();
      jumpToOutput(doc);
      setTimeout(() => jumpToOutput(doc), 260);
      return true;
    }catch(_err){
      return false;
    }
  }

  function loadFresh(){
    const url = new URL(encodeURI(SOURCE), window.location.href);
    url.searchParams.set("seed", Date.now().toString(36) + Math.random().toString(36).slice(2,8));
    frame.src = url.toString();
  }

  frame.addEventListener("load", function(){
    const doc = getDoc();
    forceGeneratedPageOnly(doc);
    jumpToOutput(doc);
    setTimeout(function(){ clickInnerGenerate(); }, 220);
  });

  btnGen.addEventListener("click", function(){
    if(!clickInnerGenerate()){
      loadFresh();
    }
  });

  btnPrint.addEventListener("click", function(){
    alert("Printing is for Members Only.\nCreate an Unlimited Amount as a Member.");
  });

  loadFresh();
})();
</script>
</body>
</html>
